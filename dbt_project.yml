name: nyc_taxi_pipeline
version: "1.0.0"
profile: nyc_taxi

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]

models:
  nyc_taxi_pipeline:
    staging:
      +materialized: view      # views cost no storage in the sandbox
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table     # marts are tables: fast for BI + easy to export
      +schema: marts
